:root{

  --rose-dark:#9A3A58;

  --charcoal:#1C1A19;
  --mid:#4A4542;
  --muted:#8A837D;
  --border:#E2DDD8;
  --border-light:#EEEAE5;
  --green:#0F6E56;
  --blue:#2A6DB5;
  --blue-light:#EBF3FB;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--charcoal);min-height:100vh;padding:2.5rem 1.25rem 5rem;}
.app{max-width:660px;margin:0 auto;}
.logo{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
h1{font-family:'DM Serif Display',serif;font-size:26px;color:var(--charcoal);line-height:1.25;margin-bottom:.5rem;}
h1 em{font-style:italic;color:var(--rose);}
.sub{font-size:13.5px;color:var(--muted);line-height:1.7;margin-bottom:2rem;max-width:520px;}
.step-block{margin-bottom:1.75rem;}
.slabel{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:block;}
.step-locked{opacity:.35;pointer-events:none;}
.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.wcard{background:var(--warm-white);border:1.5px solid var(--border);border-radius:14px;padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;position:relative;transition:border-color .15s,background .15s;}
.wcard:hover{border-color:var(--rose);background:var(--rose-light);}
.wcard.sel{border-color:var(--rose);border-width:2px;background:var(--rose-light);}
.wavatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:16px;flex-shrink:0;background:var(--blush);color:var(--rose-dark);}
.wcard.sel .wavatar{background:var(--rose);color:white;}
.wname{font-size:14px;font-weight:600;color:var(--charcoal);}
.wcard.sel .wname{color:var(--rose-dark);}
.wsub{font-size:11.5px;color:var(--muted);margin-top:1px;}
.wck{position:absolute;top:9px;right:9px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.5rem;}
.chip{font-size:12.5px;padding:6px 13px;border-radius:20px;cursor:pointer;border:1.5px solid var(--border);background:var(--warm-white);color:var(--mid);font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px;transition:border-color .12s,background .12s;}
.chip:hover{border-color:var(--rose);background:var(--rose-light);}
.chip.sel-m{background:var(--rose);color:white;border-color:var(--rose);font-weight:600;}
.chip.sel-h{background:var(--rose-light);color:var(--rose-dark);border-color:var(--rose);font-weight:600;}
.chip.noh{border-style:dashed;}
.chip.noh.sel-m{border-style:solid;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.type-card{background:var(--warm-white);border:1.5px solid var(--border);border-radius:14px;padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:13px;position:relative;transition:border-color .15s,background .15s;}
.type-card:hover{border-color:var(--rose);background:var(--rose-light);}
.type-card.sel-w{border-color:var(--rose);border-width:2px;background:var(--rose-light);}
.type-card.sel-v{border-color:var(--blue);border-width:2px;background:var(--blue-light);}
.type-icon{font-size:22px;flex-shrink:0;}
.type-name{font-size:14px;font-weight:600;color:var(--charcoal);}
.type-card.sel-w .type-name{color:var(--rose-dark);}
.type-card.sel-v .type-name{color:var(--blue);}
.type-desc{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4;}
.type-ck{position:absolute;top:9px;right:9px;}
.topic-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.topic-header-left{display:flex;flex-direction:column;gap:2px;}
.set-label{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
.refresh-btn{font-size:13px;padding:9px 18px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;background:var(--rose-light);color:var(--rose-dark);font-weight:600;transition:background .12s,transform .1s;display:inline-flex;align-items:center;gap:6px;}

.ai-btn.claude{background:#E8F0FB;color:#2A4E8C;}
.ai-btn.claude:hover{background:#D4E4F7;}
.ai-btn.chatgpt{background:#E6F5EE;color:#1A6640;}
.ai-btn.chatgpt:hover{background:#CBE9D8;}
.ai-btn.gemini{background:#FEF3E2;color:#8B5200;}
.ai-btn.gemini:hover{background:#FDE8C0;}
.ai-btn.meta{background:#EEE8FB;color:#4B2FA0;}
.ai-btn.meta:hover{background:#DDD4F7;}

.source-pill{font-size:11px;color:var(--muted);background:var(--warm-white);border:1px solid var(--border-light);border-radius:20px;padding:5px 12px;margin-bottom:.85rem;display:inline-block;line-height:1.5;}

.tdesc{font-size:12.5px;color:var(--mid);line-height:1.6;}
.tsource{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;}

.use-btn:hover{background:var(--rose);color:white;}
.use-btn.video{border-color:var(--blue);color:var(--blue);}
.use-btn.video:hover{background:var(--blue);color:white;}
.locked-msg{font-size:13px;color:var(--muted);background:var(--warm-white);border:1px solid var(--border-light);border-radius:12px;padding:13px 16px;text-align:center;}
.divider{height:1px;background:var(--border);margin:1.75rem 0;}
.prompt-back{font-size:12.5px;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-bottom:1rem;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;}
.prompt-back:hover{color:var(--charcoal);}
.prompt-meta{margin-bottom:1rem;}
.prompt-label{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.prompt-name{font-family:'DM Serif Display',serif;font-size:20px;color:var(--charcoal);line-height:1.3;}

.prompt-type-badge.written{background:var(--rose-light);color:var(--rose-dark);}
.prompt-type-badge.video{background:var(--blue-light);color:var(--blue);}
.copy-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.copy-btn{font-size:13px;padding:10px 20px;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;color:white;border:none;display:inline-flex;align-items:center;gap:7px;transition:background .12s;}
.copy-btn.written{background:var(--rose);}
.copy-btn.written:hover{background:var(--rose-dark);}
.copy-btn.video{background:var(--blue);}
.copy-btn.video:hover{background:#1e5490;}
.copy-btn.copied{background:var(--green) !important;}
.copy-hint{font-size:12px;color:var(--muted);}
/* The prompt display box - just for reading, not what gets copied */
.prompt-box{background:var(--charcoal);color:#E8E4DE;font-family:'DM Sans',sans-serif;font-size:12.5px;line-height:1.8;border-radius:14px;padding:20px 22px;white-space:pre-wrap;word-break:break-word;margin-bottom:10px;-webkit-user-select:text;user-select:text;}
/* Hidden textarea used ONLY for clipboard copy - never visible */
#clipboardHelper{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;}
.prompt-note{font-size:12px;color:var(--muted);background:var(--warm-white);border:1px solid var(--border-light);border-radius:10px;padding:10px 13px;line-height:1.65;}
.prompt-note strong{color:var(--mid);font-weight:600;}
.hol-note{font-size:12px;color:var(--rose-dark);background:var(--rose-light);border-radius:8px;padding:8px 11px;margin-top:8px;line-height:1.5;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .25s ease forwards;}
</style>

function ck(color){
  const c=color||'#C45C7A';
  return `<svg style="width:20px;height:20px;display:block;" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9.5" fill="${c}"/><path d="M5.5 10l3 3 6-6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function ck16(color){
  const c=color||'#C45C7A';
  return `<svg style="width:16px;height:16px;display:block;" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7.5" fill="${c}"/><path d="M4.5 8l2.5 2.5 4.5-4.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function render(){document.getElementById('root').innerHTML=buildUI();}

function buildUI(){
  const step1=`
    <div class="step-block">
      <span class="slabel">Step 1 -- Who is writing this post?</span>
      <div class="who-grid">
        <div class="wcard${S.author==='laura'?' sel':''}" onclick="pick('laura')">
          ${S.author==='laura'?`<div class="wck">${ck()}</div>`:''}
          <div class="wavatar">L</div>
          <div><div class="wname">Laura</div><div class="wsub">PA-C, co-owner</div></div>
        </div>
        <div class="wcard${S.author==='elizabeth'?' sel':''}" onclick="pick('elizabeth')">
          ${S.author==='elizabeth'?`<div class="wck">${ck()}</div>`:''}
          <div class="wavatar">E</div>
          <div><div class="wname">Elizabeth</div><div class="wsub">PA-C, co-owner</div></div>
        </div>
      </div>
    </div>`;

  const monthChips=MONTHS.map((m,i)=>{
    const sel=S.month===i;
    return `<button class="chip${sel?' sel-m':''}" onclick="setMonth(${i})">${m}${sel?' '+ck16('white'):''}</button>`;
  }).join('');

  const hols=(HOLIDAYS[S.month]||[]).map(h=>{
    const sel=S.holiday===h.id;
    return `<button class="chip${sel?' sel-h':''}" onclick="setHol('${h.id}')">${h.label}${sel?' '+ck16('#9A3A58'):''}</button>`;
  }).join('');
  const noHolSel=S.holiday==='none';

  const step2=`
    <div class="step-block${S.author?'':' step-locked'}">
      <span class="slabel">Step 2 -- Month and seasonal angle</span>
      <div style="margin-bottom:.75rem;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:500;">Which month?</div>
        <div class="chips">${monthChips}</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:500;">Holiday or seasonal angle? <span style="font-weight:400;">(optional)</span></div>
        <div class="chips">
          <button class="chip noh${noHolSel?' sel-m':''}" onclick="setHol('none')">No holiday${noHolSel?' '+ck16('white'):''}</button>
          ${hols}
        </div>
        ${S.holiday&&S.holiday!=='none'?`<div class="hol-note"><strong>${getHolLabel(S.holiday)}</strong> -- this angle will be baked into your prompt.</div>`:''}
      </div>
    </div>`;

  const step3=`
    <div class="step-block${S.author?'':' step-locked'}">
      <span class="slabel">Step 3 -- What type of post?</span>
      <div class="type-grid">
        <div class="type-card${S.postType==='written'?' sel-w':''}" onclick="setType('written')">
          ${S.postType==='written'?`<div class="type-ck">${ck()}</div>`:''}
          <div class="type-icon">&#x270D;&#xFE0F;</div>
          <div>
            <div class="type-name">Written post</div>
            <div class="type-desc">Caption + hashtags + Stories idea</div>
          </div>
        </div>
        <div class="type-card${S.postType==='video'?' sel-v':''}" onclick="setType('video')">
          ${S.postType==='video'?`<div class="type-ck">${ck('#2A6DB5')}</div>`:''}
          <div class="type-icon">&#x1F3AC;</div>
          <div>
            <div class="type-name">Video / Reel</div>
            <div class="type-desc">Hook + script + on-screen text</div>
          </div>
        </div>
      </div>
    </div>`;

  if(S.prompt) return step1+step2+step3+buildPromptUI();

  const canSeeTopic=S.author&&S.postType;
  const topics=TOPIC_SETS[S.setIdx];
  const setLetters=['A','B','C','D'];
  const isVideo=S.postType==='video';

  const freeCard=canSeeTopic?`
    <div class="tcard" style="border-style:dashed;border-color:var(--rose);background:var(--rose-light);">
      <div class="tnum" style="font-size:18px;padding-top:0;">&#x270E;</div>
      <div class="tbody">
        <div class="ttitle">Write your own topic</div>
        <div class="tdesc" style="color:var(--mid);">Deals, promos, new patient specials, events, announcements -- anything not in the list below.</div>
        <textarea id="freeTextInput" placeholder="e.g. 20% off VI Peels this month, Easter weekend promo, new patient special..." oninput="S.freeText=this.value" style="width:100%;margin-top:9px;font-size:13px;padding:9px 10px;border:1.5px solid var(--rose);border-radius:8px;font-family:'DM Sans',sans-serif;background:white;color:var(--charcoal);resize:vertical;min-height:64px;line-height:1.5;outline:none;"></textarea>
        <button class="use-btn${isVideo?' video':''}" style="margin-top:8px;" onclick="buildFreePrompt()">
          ${isVideo?'Build script prompt &rarr;':'Build caption prompt &rarr;'}
        </button>
      </div>
    </div>`:'';

  const step4=`
    <div class="step-block${canSeeTopic?'':' step-locked'}">
      <div class="topic-header">
        <div class="topic-header-left">
          <span class="set-label">Topic set ${setLetters[S.setIdx]} of 4</span>
          <span class="slabel" style="margin:0;">Step 4 -- Pick a topic</span>
        </div>
        <button class="refresh-btn" onclick="rotate()">&#x21BB; Refresh topics</button>
      </div>
      <div class="source-pill">Based on: ${SOURCES}</div>
      ${canSeeTopic ? `
      <div class="topic-list fade">
        ${freeCard}
        ${topics.map((t,i)=>`
          <div class="tcard">
            <div class="tnum">${i+1}</div>
            <div class="tbody">
              <div class="ttitle">${t.title}</div>
              <div class="tdesc">${t.desc}</div>
              <div class="tsource">${t.source}</div>
              <button class="use-btn${isVideo?' video':''}" onclick="buildPrompt(${i})">
                ${isVideo?'Build script prompt &rarr;':'Build caption prompt &rarr;'}
              </button>
            </div>
          </div>`).join('')}
      </div>` : `<div class="locked-msg">Complete steps 1 and 3 above to unlock topics</div>`}
    </div>
    <div style="text-align:center;margin-top:1.75rem;padding-top:1.5rem;border-top:1px solid var(--border-light);">
      <button onclick="resetAll()" style="font-size:12.5px;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:background .12s,color .12s;" onmouseover="this.style.background='var(--border-light)';this.style.color='var(--charcoal)'" onmouseout="this.style.background='transparent';this.style.color='var(--muted)'">
        &#x21BA;&nbsp; Start over / clear all selections
      </button>
    </div>`;

  return step1+step2+step3+step4;
}

function buildPromptUI(){
  const isVideo=S.postType==='video';
  const badgeClass=isVideo?'video':'written';
  const claudeIcon=`<svg style="width:16px;height:16px;flex-shrink:0;" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#C17B4E" opacity=".2"/><text x="12" y="16" text-anchor="middle" font-size="12" fill="#7B4A1E" font-family="serif">C</text></svg>`;
  const gptIcon=`<svg style="width:16px;height:16px;flex-shrink:0;" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#10A37F" opacity=".2"/><path d="M12 7v10M7 12h10" stroke="#10A37F" stroke-width="2" stroke-linecap="round"/></svg>`;
  const geminiIcon=`<svg style="width:16px;height:16px;flex-shrink:0;" viewBox="0 0 24 24" fill="none"><polygon points="12,3 14.5,10 22,10 16,14.5 18.5,21.5 12,17 5.5,21.5 8,14.5 2,10 9.5,10" fill="#F9AB00" opacity=".7"/></svg>`;
  const metaIcon=`<svg style="width:16px;height:16px;flex-shrink:0;" viewBox="0 0 24 24" fill="none"><ellipse cx="8" cy="12" rx="4" ry="6" stroke="#7B4FD1" stroke-width="1.8" fill="none"/><ellipse cx="16" cy="12" rx="4" ry="6" stroke="#7B4FD1" stroke-width="1.8" fill="none"/></svg>`;
  return `
    <div class="divider"></div>
    <button class="prompt-back" onclick="goBack()">&#8592; Back to topics</button>
    <div class="prompt-meta">
      <div class="prompt-label">Step 5 -- Copy and paste into any AI</div>
      <div class="prompt-name">${S.selectedTopic}</div>
      <div class="prompt-type-badge ${badgeClass}">${isVideo?'Video / Reel script':'Written caption'} prompt</div>
    </div>
    <div class="copy-row">
      <button class="copy-btn ${badgeClass}" id="copybtn" onclick="doCopy()">Copy prompt</button>
    </div>
    <div id="ai-btns-row" class="ai-buttons-row" style="display:none;">
      <a href="https://claude.ai" target="_blank" class="ai-btn claude">${claudeIcon} Open Claude</a>
      <a href="https://chat.openai.com" target="_blank" class="ai-btn chatgpt">${gptIcon} Open ChatGPT</a>
      <a href="https://gemini.google.com" target="_blank" class="ai-btn gemini">${geminiIcon} Open Gemini</a>
      <a href="https://www.meta.ai" target="_blank" class="ai-btn meta">${metaIcon} Open Meta AI</a>
    </div>
    <div class="prompt-box">${escHtml(S.prompt)}</div>
    <div class="prompt-note"><strong>How to use:</strong> Click Copy prompt, then open Claude or ChatGPT using the buttons above and paste.</div>`;
}

// Build written caption prompt - pure plain text, no special unicode chars
function makeWrittenPrompt(t){
  const n=S.author==='laura'?'Laura':'Elizabeth';
  const other=n==='Laura'?'Elizabeth':'Laura';
  const mn=MONTHS[S.month];
  const hasHol=S.holiday&&S.holiday!=='none';
  const holName=hasHol?getHolLabel(S.holiday):'';
  const holSection=hasHol
    ? '\n\nHOLIDAY REQUIREMENT:\nThis post must reference '+holName+' directly. '+HANGLES[S.holiday]+' The '+holName+' reference must appear clearly in the caption itself -- do not write a generic post.'
    : '';

  return 'You are writing Instagram captions for '+n+', PA-C, co-owner of Williamston Aesthetics.\n\n'
    +'--- ABOUT WILLIAMSTON AESTHETICS ---\n'
    +'A twin PA-owned medical spa in Williamston, Michigan (small, close-knit community).\n'
    +'Address: 147 E Grand River Ave, Suite 100, Williamston, MI 48895\n'
    +'Phone: (810) 266-0478\n'
    +'Co-owners: '+n+' PA-C and '+other+' PA-C (twin sisters, both licensed Physician Assistants)\n'
    +'Services: Botox ($12/unit standard, $10/unit for VIP members), dermal fillers (from $650), microneedling (from $300), VI Peel and chemical peels (from $200), VIP membership, Botox parties and concierge events\n'
    +'Booking: williamston-aesthetics.myaestheticrecord.com\n\n'
    +'--- '+n.toUpperCase()+"'S WRITING VOICE ---\n"
    +'- First person using "I" -- '+n+' is speaking directly to her followers\n'
    +'- Warm, soft, and human -- like a text from a friend who happens to be a PA, not a brand announcement\n'
    +'- Never corporate, never salesy, never stiff. No buzzwords or marketing language.\n'
    +'- Short sentences. Real words. The kind of thing you would actually say out loud.\n'
    +'- Community-focused: patients are neighbors she sees around Williamston\n'
    +'- Philosophy: conservative, natural results -- never overfilled, never frozen\n'
    +'- Never make specific medical outcome guarantees\n'
    +'- Always mention "Williamston" or "Williamston, MI" somewhere naturally in the caption\n'
    +'- DO NOT use em dashes (the long dash character like this: --). Use a comma, a period, or start a new line instead.\n'
    +'- EMOJIS: For each caption independently, randomly decide to use 0, 1, or 2 emojis. Some captions should have none at all. This randomness is intentional -- it makes the account look natural and human rather than formulaic. When you do use one, choose only from this set: 💉 ✨ 🌿 💗 📍 🙋 💆 👩‍⚕️ 🫶. Never cluster emojis together. Never put one in the middle of a sentence. Best placed at the end of the hook line or the CTA line.'
    +holSection+'\n\n'
    +'--- POST DETAILS ---\n'
    +'Month: '+mn+'\n'
    +'Topic: '+t.title+'\n'
    +'What to cover: '+t.desc+'\n'
    +'Content inspired by: '+t.source+'\n\n'
    +'--- YOUR TASK ---\n'
    +'Write exactly 3 distinct Instagram captions about "'+t.title+'". Each must be genuinely different in length, opening line, angle, and style. Do NOT write generic Williamston Aesthetics content -- every caption must clearly be about this specific topic.\n\n'
    +'CAPTION 1 - SHORT AND PUNCHY (2-3 lines):\n'
    +'First line is a scroll-stopping hook directly about the topic.\n'
    +'Second line delivers the key insight.\n'
    +'Third line: simple CTA (link in bio, DM us, or book via link below).\n\n'
    +'CAPTION 2 - WARM AND PERSONAL (one short paragraph):\n'
    +'This one should feel like '+n+' is sitting across from someone at a coffee shop telling them something real.\n'
    +'No lists, no bullet energy, no "as a PA I..." opener.\n'
    +'Just a small personal moment, a patient observation, or something she genuinely thinks about.\n'
    +'Conversational sentence rhythm. Soft. Maybe a little vulnerable.\n'
    +'End with a low-pressure question that invites a real reply, not a generic "drop a comment below."\n\n'
    +'CAPTION 3 - HELPFUL AND CLEAR WITH A CTA (4-5 lines):\n'
    +'This one teaches something useful but still sounds like a person, not a pamphlet.\n'
    +'Start with something relatable, not a statistic or a bold claim.\n'
    +'Keep the education light and conversational -- one or two things, not a full explainer.\n'
    +"Bring in "+n+"'s PA background naturally, not as a credential flex.\n"
    +'Mention Williamston, MI.\n'
    +'End with a warm, specific CTA. Not "link in bio" alone -- give them a reason to click.\n\n'
    +'--- HASHTAGS ---\n'
    +'For each caption, do the following:\n'
    +'1. Start with this pool of 10 brand hashtags: '+HASHTAGS+'\n'
    +'2. Generate 5 additional hashtags specific to this exact post topic (relevant, actually searched on Instagram, not generic filler).\n'
    +'3. You now have 15 hashtags total. Pick the 10 you think will perform best for this specific post.\n'
    +'4. Randomly reorder those 10 so they are never in the same sequence.\n'
    +'5. Place that final set of 10 on a single line below the caption text.\n'
    +'Every caption must have its own unique set and order. All 3 captions must be fully self-contained and ready to copy and paste.\n\n'
    +'--- STORIES IDEA ---\n'
    +'Also write one same-day Instagram Stories idea -- a poll, question box, or fill-in-the-blank related to this topic. 10 words or fewer.\n\n'
    +'--- IMPORTANT: RESPONSE FORMAT ---\n'
    +'Reply with plain text only. Do NOT create an artifact, widget, HTML file, or any kind of rendered output. Just type the captions directly in your response as plain text. Fast and simple is the goal.\n\n'
    +'--- FORMAT YOUR RESPONSE EXACTLY LIKE THIS ---\n\n'
    +'CAPTION 1:\n'
    +'[caption text]\n\n'
    +'[10 hashtags in random order]\n\n'
    +'CAPTION 2:\n'
    +'[caption text]\n\n'
    +'[10 hashtags in random order]\n\n'
    +'CAPTION 3:\n'
    +'[caption text]\n\n'
    +'[10 hashtags in random order]\n\n'
    +'STORIES IDEA:\n'
    +'[text]';
}

// Build video/reel script prompt - pure plain text
function makeVideoPrompt(t){
  const n=S.author==='laura'?'Laura':'Elizabeth';
  const other=n==='Laura'?'Elizabeth':'Laura';
  const mn=MONTHS[S.month];
  const hasHol=S.holiday&&S.holiday!=='none';
  const holName=hasHol?getHolLabel(S.holiday):'';
  const holSection=hasHol
    ? '\n\nHOLIDAY REQUIREMENT:\nThis Reel must reference '+holName+' directly. '+HANGLES[S.holiday]+' The '+holName+' reference must appear in the hook or spoken script.'
    : '';

  return 'You are writing an Instagram Reel script for '+n+', PA-C, co-owner of Williamston Aesthetics.\n\n'
    +'--- ABOUT WILLIAMSTON AESTHETICS ---\n'
    +'A twin PA-owned medical spa in Williamston, Michigan (small, close-knit community).\n'
    +'Address: 147 E Grand River Ave, Suite 100, Williamston, MI 48895\n'
    +'Phone: (810) 266-0478\n'
    +'Co-owners: '+n+' PA-C and '+other+' PA-C (twin sisters, both licensed Physician Assistants)\n'
    +'Services: Botox ($12/unit standard, $10/unit for VIP members), dermal fillers (from $650), microneedling (from $300), VI Peel and chemical peels (from $200), VIP membership, Botox parties and concierge events\n'
    +'Booking: williamston-aesthetics.myaestheticrecord.com\n\n'
    +'--- '+n.toUpperCase()+"'S ON-CAMERA VOICE ---\n"
    +'- First person using "I" -- '+n+' speaks directly to camera\n'
    +'- Warm, soft, and real -- like a knowledgeable friend talking to you, not presenting to you\n'
    +'- Short sentences. Natural pauses. The kind of thing you would actually say out loud.\n'
    +'- Never corporate, never stiff, no buzzwords or marketing language\n'
    +'- Community-focused: she knows her patients personally in Williamston\n'
    +'- Never make specific medical outcome guarantees\n'
    +'- DO NOT use em dashes (the long dash character). Use a comma, a period, or a pause instead.\n'
    +'- EMOJIS: In the caption field only, randomly decide to use 0, 1, or 2 emojis. Sometimes use none at all -- this randomness makes the account look natural and human rather than formulaic. When you do use one, choose only from this set: 💉 ✨ 🌿 💗 📍 🙋 💆 👩‍⚕️ 🫶. Never cluster them. Do not use emojis in the spoken script or on-screen text overlays.'
    +holSection+'\n\n'
    +'--- REEL DETAILS ---\n'
    +'Month: '+mn+'\n'
    +'Topic: '+t.title+'\n'
    +'What to cover: '+t.desc+'\n'
    +'Content inspired by: '+t.source+'\n\n'
    +'--- YOUR TASK ---\n'
    +'Write a complete Instagram Reel production guide for '+n+' to film talking-to-camera about "'+t.title+'". Keep it real and speakable -- no stiff language.\n\n'
    +'HOOK (first 1-3 seconds on screen):\n'
    +'One punchy line that stops the scroll. Can be a question, surprising statement, or bold claim.\n\n'
    +'SCRIPT (word-for-word, spoken to camera):\n'
    +'Write exactly what '+n+' says. Natural pacing -- use line breaks to show pauses. Target 20-40 seconds when spoken aloud. Reference Williamston, MI naturally. End with a clear spoken CTA.\n\n'
    +'ON-SCREEN TEXT OVERLAYS (added in Instagram editor after filming):\n'
    +'List 4-6 text overlays with approximate timing. Format: [0-2 sec]: text here. Max 6 words per overlay.\n\n'
    +'CAPTION (for the Instagram caption field -- not spoken):\n'
    +'3-4 lines. Hook first. Mention Williamston, MI. Clear CTA. No hashtags in the caption body. Hashtags go on the lines directly below the caption text.\n\n'
    +'HASHTAGS:\n'
    +'Do the following:\n'
    +'1. Start with this pool of 10 brand hashtags: '+HASHTAGS+'\n'
    +'2. Generate 5 additional hashtags specific to this exact Reel topic (relevant, actually searched on Instagram, not generic filler).\n'
    +'3. You now have 15 hashtags total. Pick the 10 you think will perform best for this specific post.\n'
    +'4. Randomly reorder those 10 so they are never in the same sequence.\n'
    +'5. Place that final set of 10 on a single line below the caption text.\n\n'
    +'AUDIO SUGGESTION:\n'
    +'Recommend original voice, trending audio, or a specific search term for Instagram audio library. Include the reason.\n\n'
    +'--- IMPORTANT: RESPONSE FORMAT ---\n'
    +'Reply with plain text only. Do NOT create an artifact, widget, HTML file, or any kind of rendered output. Just type the script directly in your response as plain text. Fast and simple is the goal.\n\n'
    +'--- FORMAT YOUR RESPONSE EXACTLY LIKE THIS ---\n\n'
    +'HOOK:\n'
    +'[text]\n\n'
    +'SCRIPT:\n'
    +'[text]\n\n'
    +'ON-SCREEN TEXT:\n'
    +'[text]\n\n'
    +'CAPTION:\n'
    +'[caption text]\n\n'
    +'[10 hashtags in random order]\n\n'
    +'AUDIO:\n'
    +'[text]';
}

function buildPrompt(idx){
  const t=TOPIC_SETS[S.setIdx][idx];
  S.selectedTopic=t.title;
  S.prompt=S.postType==='video'?makeVideoPrompt(t):makeWrittenPrompt(t);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Robust copy using hidden textarea -- works in all browsers including local file
function doCopy(){
  const text=S.prompt;
  const ta=document.getElementById('clipboardHelper');
  ta.value=text;
  ta.removeAttribute('readonly');
  ta.focus();
  ta.select();
  ta.setSelectionRange(0,text.length);

  let success=false;
  try{
    success=document.execCommand('copy');
  }catch(e){}

  ta.setAttribute('readonly','');
  ta.blur();

  // Also try modern API as backup
  if(!success&&navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{});
    success=true;
  }

  const btn=document.getElementById('copybtn');
  if(btn){
    btn.textContent=success?'Copied!':'Select all above and copy manually';
    btn.classList.add('copied');
    // Show the AI launch buttons
    const aiRow=document.getElementById('ai-btns-row');
    if(aiRow)aiRow.style.display='flex';
    setTimeout(()=>{
      const b=document.getElementById('copybtn');
      if(b){b.textContent='Copy prompt';b.classList.remove('copied');}
    },2500);
  }
}

function escHtml(s){
  return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pick(a){S.author=a;render();}
function setMonth(i){S.month=i;S.holiday=null;render();}
function setHol(id){S.holiday=id;render();}
function setType(t){S.postType=t;render();}
function rotate(){S.setIdx=(S.setIdx+1)%TOPIC_SETS.length;render();}
function goBack(){S.prompt=null;S.selectedTopic=null;render();}
function resetAll(){S.author=null;S.month=new Date().getMonth();S.holiday=null;S.postType=null;S.prompt=null;S.selectedTopic=null;S.freeText='';render();window.scrollTo({top:0,behavior:'smooth'});}
function buildFreePrompt(){const txt=(S.freeText||'').trim();if(!txt)return;const t={title:txt,desc:'This is a custom topic entered by '+( S.author==='laura'?'Laura':'Elizabeth')+': '+txt,source:'Custom entry'};S.selectedTopic=txt;S.prompt=S.postType==='video'?makeVideoPrompt(t):makeWrittenPrompt(t);render();window.scrollTo({top:0,behavior:'smooth'});}

render();
</script>
